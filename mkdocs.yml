site_name: Bio Sea Pearl
site_url: https://bibymaths.github.io/bio-sea-pearl/

repo_name: bibymaths/bio-sea-pearl
repo_url: https://github.com/bibymaths/bio-sea-pearl

theme:
  name: material

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy

  icon:
    repo: fontawesome/brands/github

  palette:
    - scheme: default
      primary: indigo
      accent: indigo

  font:
    text: Roboto
    code: Roboto Mono

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bibymaths

copyright: "© 2026 Abhinav Mishra — Bio Sea Pearl"

nav:
  - Home: index.md
  - Overview:
      - Architecture: architecture.md
      - API Reference: api.md
      - CLI Usage: cli.md
  - Modules:
      - Alignment: alignment.md
      - Markov: markov.md
      - SeqTools: seqtools.md
      - BWT & FM-index: bio_sea_pearl.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets