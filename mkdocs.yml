site_name: Bio Sea Pearl
site_url: https://bibymaths.github.io/bio-sea-pearl/
site_description: Sequence analysis and bioinformatics utilities in Python and Perl.

repo_name: bibymaths/bio-sea-pearl
repo_url: https://github.com/bibymaths/bio-sea-pearl
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  font:
    text: Ubuntu           # The font for standard paragraph text
    code: Fira Code        # The font for code blocks
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo # Change this to your brand color!
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      separator: '[\s\-\.]+'
  - swagger-ui-tag:
      validatorUrl: none

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - Interfaces:
      - CLI Reference: cli.md
      - REST API: api.md
  - Architecture: architecture.md
  - Modules:
      - Alignment: modules/alignment.md
      - Markov Chains: modules/markov.md
      - Sequence Tools: modules/seqtools.md
      - BWT & FM-index: modules/bwt.md
  - Developer Guide:
      - Extending the Toolkit: developer/extending.md
      - Troubleshooting: developer/troubleshooting.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - def_list

copyright: >
  Copyright &copy; 2026 <a href="https://bibymaths.github.io">Abhinav Mishra</a>.